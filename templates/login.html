{% extends "base.html" %}
{% block title %}Sign In — The Lot Scout{% endblock %}

{% block head %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 64px - 120px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .auth-box {
    background: var(--card);
    border: 1px solid var(--line);
    border-top: 4px solid var(--tan);
    width: 100%;
    max-width: 440px;
    padding: 40px 36px;
  }
  .auth-icon { text-align: center; margin-bottom: 8px; }
  .auth-box h1 {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--navy);
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 6px;
  }
  .auth-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 28px;
  }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--bg);
    padding: 11px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color .15s;
  }
  .form-group input:focus { border-color: var(--tan); background: #fff; }
  .submit-btn {
    width: 100%;
    background: var(--navy);
    color: #fff;
    border: none;
    padding: 13px;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 1px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    margin-top: 8px;
  }
  .submit-btn:hover { background: var(--navy2); }
  .auth-footer {
    text-align: center;
    margin-top: 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .auth-footer a { color: var(--navy); text-decoration: underline; }
  .error-box {
    background: #f8d7da;
    border: 1px solid #f5c6cb;
    color: #721c24;
    padding: 10px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    margin-bottom: 18px;
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-icon">
      <svg width="36" height="36" viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="46" stroke="#c9a87a" stroke-width="5"/>
        <circle cx="50" cy="50" r="30" stroke="#c9a87a" stroke-width="5"/>
        <circle cx="50" cy="50" r="14" stroke="#c9a87a" stroke-width="5"/>
        <circle cx="50" cy="50" r="4" fill="#e0c79f"/>
        <line x1="50" y1="0" x2="50" y2="10" stroke="#e0c79f" stroke-width="4"/>
        <line x1="50" y1="90" x2="50" y2="100" stroke="#e0c79f" stroke-width="4"/>
        <line x1="0" y1="50" x2="10" y2="50" stroke="#e0c79f" stroke-width="4"/>
        <line x1="90" y1="50" x2="100" y2="50" stroke="#e0c79f" stroke-width="4"/>
      </svg>
    </div>

    <h1>Welcome Back</h1>
    <div class="auth-sub">Sign in to your Lot Scout account</div>

    {% if error %}
      <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="submit-btn">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/signup?tier=pro">Start free trial</a>
    </div>
  </div>
</div>
{% endblock %}
